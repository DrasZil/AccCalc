<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AccCalc Redirect</title>
    <script>
      (function () {
        var currentUrl = new URL(window.location.href);
        var nextUrl =
          currentUrl.origin +
          "/#" +
          currentUrl.pathname +
          currentUrl.search +
          currentUrl.hash;

        window.location.replace(nextUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
